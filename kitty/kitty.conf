background_opacity 1.00
confirm_os_window_close 0

font_family GoMono Nerd Font
enabled_layouts tall

font_size 18.0

# window mgmt
map ctrl+enter new_window
map ctrl+l next_window
map ctrl+h previous_window

# tab mgmt
map super+enter new_tab
map super+l next_tab
map super+h previous_tab
map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard


tab_bar_edge top
tab_bar_style powerline

map shift+enter send_text all \e\r
