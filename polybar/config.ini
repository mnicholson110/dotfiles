[colors]
background = #d9d3d7dc
foreground = #1f2328
muted = #5f6b76
accent = #4c6a92
border = #b8bec5

[bar/main]
monitor = ${env:MONITOR:}
width = 98%
height = 34
offset-x = 1%
offset-y = 8
radius = 12
fixed-center = true
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
border-size = 1
border-color = ${colors.border}
padding-left = 2
padding-right = 2
module-margin = 1
wm-restack = generic
override-redirect = false
enable-ipc = true
font-0 = monospace:size=10;2
modules-left = menu title
modules-right = ${env:POLYBAR_RIGHT_MODULES:volume date tray}

[module/menu]
type = custom/text
format = <label>
format-foreground = ${colors.accent}
label = apps
click-left = rofi -show drun

[module/title]
type = internal/xwindow
label = %title:0:80:...%
label-empty = desktop
label-empty-foreground = ${colors.muted}

[module/volume]
type = internal/pulseaudio
use-ui-max = false
label-volume = vol %percentage%%
label-muted = vol muted
label-muted-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 5
date = %Y-%m-%d %I:%M %p
label = %date%

[module/tray]
type = internal/tray
format-margin = 6px
tray-spacing = 6px

[settings]
screenchange-reload = true
pseudo-transparency = false
